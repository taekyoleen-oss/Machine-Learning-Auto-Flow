      - code [ref=e418]: "# 전체 파이프라인 실행 코드 (외부 Python에서 그대로 실행 가능 · 동일 결과 재현) import pandas as pd import numpy as np # ── [1/2] Load (LoadData) ── import pandas as pd file_path = 'ratings_small.csv' dataframe = pd.read_csv(file_path) data_module_1 = dataframe print(f\"[Load] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [2/2] Recommender (Recommender) ── dataframe = data_module_1 # ← [Load] 출력 import pandas as pd import numpy as np from sklearn.decomposition import NMF agg = dataframe.groupby(['user_id', 'item_id'], as_index=False)['rating'].mean() matrix = agg.pivot(index='user_id', columns='item_id', values='rating') matrix = matrix.sort_index(axis=0).sort_index(axis=1) users = list(matrix.index) items = list(matrix.columns) R = matrix.to_numpy(dtype=float) rated_mask = ~np.isnan(R) # True where the user already rated the item R_filled = np.nan_to_num(R, nan=0.0) # NMF needs a non-negative, NaN-free matrix n_comp = max(1, min(int(2), min(R_filled.shape))) model = NMF(n_components=n_comp, init='nndsvda', random_state=42, max_iter=500) W = model.fit_transform(R_filled) H = model.components_ R_hat = W @ H # reconstructed (predicted) ratings recs = [] for ui, u in enumerate(users): scores = R_hat[ui].copy() scores[rated_mask[ui]] = -np.inf # exclude already-rated items order = sorted(range(len(items)), key=lambda j: (-scores[j], j)) rank = 0 for j in order: if not np.isfinite(scores[j]): continue rank += 1 recs.append({ 'user_id': u, 'rank': rank, 'item_id': items[j], 'predicted_rating': round(float(R_hat[ui, j]), 4), }) if rank >= int(3): break recommendations = pd.DataFrame(recs, columns=['user_id', 'rank', 'item_id', 'predicted_rating']) recommendations = recommendations.sort_values(['user_id', 'rank']).reset_index(drop=True) print(f\"Recommender: {len(users)} users x {len(items)} items, {n_comp} components -> {len(recommendations)} recommendations.\") data_module_1 = recommendations print(f\"[Recommender] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── 파이프라인 실행 완료 ──"
