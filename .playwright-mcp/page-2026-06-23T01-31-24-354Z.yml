      - code [ref=e418]: "# 전체 파이프라인 실행 코드 (외부 Python에서 그대로 실행 가능 · 동일 결과 재현) import pandas as pd import numpy as np # ── [1/9] Load Data (LoadData) ── import pandas as pd file_path = 'your-data-source.csv' dataframe = pd.read_csv(file_path) data_module_1 = dataframe print(f\"[Load Data] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [2/9] Select Data 1 (SelectData) ── dataframe = data_module_1 # ← [Load Data] 출력 import pandas as pd def select_data(df: pd.DataFrame, columns: list): \"\"\" 지정된 컬럼만 선택합니다. \"\"\" print(f\"컬럼 선택: {columns}\") selected_df = df[columns].copy() print(f\"선택 완료. Shape: {selected_df.shape}\") return selected_df column_selections = {} selected_columns = [col for col, sel in column_selections.items() if sel.get('selected', True)] selected_data = select_data(dataframe, selected_columns) data_module_1 = selected_data print(f\"[Select Data 1] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [3/9] Split Data (SplitData) ── dataframe = data_module_1 # ← [Select Data 1] 출력 from sklearn.model_selection import train_test_split import pandas as pd df = dataframe.copy() df.index = range(len(df)) stratify_array = None if None and None != \"None\": stratify_array = df[None] split_kwargs = {} split_kwargs['train_size'] = 0.75 split_kwargs['random_state'] = 43 split_kwargs['shuffle'] = True if stratify_array is not None: split_kwargs['stratify'] = stratify_array train_data, test_data = train_test_split(df, **split_kwargs) data_module_1_train = train_data data_module_1_test = test_data print(f\"[Split Data] train: {data_module_1_train.shape}, test: {data_module_1_test.shape}\") print() # ── [4/9] Statistics 1 (Statistics) ── dataframe = data_module_1 # ← [Load Data] 출력 import pandas as pd import numpy as np import seaborn as sns import matplotlib.pyplot as plt def analyze_statistics(df: pd.DataFrame): \"\"\" 데이터프레임에 대한 기술 통계량과 상관관계 분석을 수행합니다. \"\"\" print(\"=\" * 60) print(\"기술 통계량 분석\") print(\"=\" * 60) desc_stats = df.describe() print(desc_stats) print(\"\\n결측치 정보:\") print(df.isnull().sum()) print(\"\\n\" + \"=\" * 60) print(\"상관관계 행렬\") print(\"=\" * 60) numeric_df = df.select_dtypes(include=[np.number]) if len(numeric_df.columns) > 0: corr_matrix = numeric_df.corr() print(corr_matrix) if len(numeric_df.columns) > 1: plt.figure(figsize=(12, 10)) sns.heatmap(corr_matrix, annot=True, cmap='coolwarm', fmt=\".2f\", center=0) plt.title('상관관계 히트맵') plt.tight_layout() plt.show() else: print(\"수치형 컬럼이 없어 상관관계 분석을 수행할 수 없습니다.\") corr_matrix = None return desc_stats, corr_matrix descriptive_statistics, correlation_matrix = analyze_statistics(dataframe) # ── [5/9] K-Means Clustering 1 (KMeans) ── from sklearn.cluster import KMeans p_random_state = 42 if p_random_state is None: p_random_state = 42 # 재현성 보장을 위한 기본 시드 model = KMeans( n_clusters=3, init='k-means++', n_init=10, max_iter=300, random_state=p_random_state, ) print(f\"K-Means model instance created (n_clusters={3}, init={'k-means++'}).\") model_module_1 = model print(f\"[K-Means Clustering 1] 모델: {model_module_1}\") print() # ── [6/9] Missing Transform 1 (HandleMissingValues) ── dataframe = data_module_1_train # ← [Split Data] 출력 dataframe2 = data_module_1_test # ← [Split Data] 출력 import pandas as pd import numpy as np from sklearn.impute import SimpleImputer, KNNImputer def handle_missing_values(df: pd.DataFrame, method: str = 'remove_row', strategy: str = 'mean', columns: list = None, n_neighbors: int = 5): \"\"\" 결측치를 처리합니다. \"\"\" print(f\"결측치 처리 방법: 'remove_row'\") df_processed = df.copy() if method == 'remove_row': original_shape = df_processed.shape df_processed = df_processed.dropna() print(f\"행 제거 완료. {original_shape[0]} -> {df_processed.shape[0]} 행\") elif method == 'impute': cols_to_impute = columns if columns else df_processed.select_dtypes(include=[np.number]).columns.tolist() for col in cols_to_impute: if col not in df_processed.columns: continue if df_processed[col].isnull().any(): if strategy == 'mean': fill_value = df_processed[col].mean() elif strategy == 'median': fill_value = df_processed[col].median() elif strategy == 'mode': fill_value = df_processed[col].mode()[0] if not df_processed[col].mode().empty else 0 else: fill_value = df_processed[col].mean() df_processed[col].fillna(fill_value, inplace=True) print(f\"컬럼 '{col}' 결측치를 'mean' 값({fill_value:.2f})으로 대체\") elif method == 'knn': numeric_cols = df_processed.select_dtypes(include=[np.number]).columns.tolist() if len(numeric_cols) > 0: imputer = KNNImputer(n_neighbors=n_neighbors) df_processed[numeric_cols] = imputer.fit_transform(df_processed[numeric_cols]) print(f\"KNN 방법으로 결측치 처리 완료 (n_neighbors=5)\") else: print(\"경고: 수치형 컬럼이 없어 KNN 방법을 사용할 수 없습니다.\") return df_processed p_column_selections = {} p_columns = [c for c, s in p_column_selections.items() if isinstance(s, dict) and s.get('selected', False)] or None cleaned_data = handle_missing_values(dataframe, 'remove_row', 'mean', p_columns, 5) data_module_1 = cleaned_data print(f\"[Missing Transform 1] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [7/9] Scaling Transform 1 (ScalingTransform) ── dataframe = data_module_1 # ← [Missing Transform 1] 출력 dataframe2 = data_module_1 # ← [Missing Transform 1] 출력 from sklearn.preprocessing import MinMaxScaler, StandardScaler, RobustScaler import pandas as pd import numpy as np def normalize_data(df: pd.DataFrame, method: str = 'MinMax', columns: list = None): \"\"\" 데이터를 정규화합니다. \"\"\" print(f\"데이터 정규화 방법: 'MinMax'\") df_normalized = df.copy() if not columns: # None 또는 빈 리스트면 전체 수치형 컬럼을 대상으로 함 columns = df_normalized.select_dtypes(include=[np.number]).columns.tolist() if method == 'MinMax': scaler = MinMaxScaler() elif method == 'StandardScaler': scaler = StandardScaler() elif method == 'RobustScaler': scaler = RobustScaler() else: print(f\"알 수 없는 정규화 방법: 'MinMax'. MinMax를 사용합니다.\") scaler = MinMaxScaler() df_normalized[columns] = scaler.fit_transform(df_normalized[columns]) print(f\"정규화 완료. 컬럼: {columns}\") return df_normalized column_selections = {} p_columns = [col for col, sel in column_selections.items() if sel.get('selected', False) and col in dataframe.columns] normalized_data = normalize_data(dataframe, 'MinMax', p_columns) data_module_1 = normalized_data print(f\"[Scaling Transform 1] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [8/9] Train Clustering Model 1 (TrainClusteringModel) ── dataframe = data_module_1 # ← [Scaling Transform 1] 출력 trained_model = model_module_1 # ← [K-Means Clustering 1] 출력 import pandas as pd p_feature_columns = [] if not p_feature_columns: feature_cols = dataframe.select_dtypes(include=['number']).columns.tolist() else: feature_cols = list(p_feature_columns) X = dataframe[feature_cols] trained_model = model.fit(X) print(f\"Clustering model trained on {len(feature_cols)} feature(s): {feature_cols}\") model_module_1 = trained_model print(f\"[Train Clustering Model 1] 모델: {model_module_1}\") print() # ── [9/9] Clustering Data 1 (ClusteringData) ── dataframe = data_module_1 # ← [Scaling Transform 1] 출력 trained_model = model_module_1 # ← [Train Clustering Model 1] 출력 import pandas as pd import numpy as np if hasattr(trained_model, 'feature_names_in_'): feature_cols = list(trained_model.feature_names_in_) else: feature_cols = dataframe.select_dtypes(include=['number']).columns.tolist() X = dataframe[feature_cols] clustered_data = dataframe.copy() if hasattr(trained_model, 'predict'): clustered_data['Cluster'] = trained_model.predict(X) elif hasattr(trained_model, 'transform'): components = np.asarray(trained_model.transform(X)) for i in range(components.shape[1]): clustered_data[f'PC{i + 1}'] = components[:, i] else: clustered_data['Cluster'] = np.asarray(trained_model.labels_) data_module_1 = clustered_data print(f\"[Clustering Data 1] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── 파이프라인 실행 완료 ──"
