      - code [ref=e418]: "# 전체 파이프라인 실행 코드 (외부 Python에서 그대로 실행 가능 · 동일 결과 재현) import pandas as pd import numpy as np # ── [1/8] 데이터 로드 (LoadData) ── import pandas as pd file_path = 'glass06.csv' dataframe = pd.read_csv(file_path) data_module_1 = dataframe print(f\"[데이터 로드] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [2/8] 결측치 처리 (HandleMissingValues) ── dataframe = data_module_1 # ← [데이터 로드] 출력 import pandas as pd import numpy as np from sklearn.impute import SimpleImputer, KNNImputer def handle_missing_values(df: pd.DataFrame, method: str = 'remove_row', strategy: str = 'mean', columns: list = None, n_neighbors: int = 5): \"\"\" 결측치를 처리합니다. \"\"\" print(f\"결측치 처리 방법: 'remove_row'\") df_processed = df.copy() if method == 'remove_row': original_shape = df_processed.shape df_processed = df_processed.dropna() print(f\"행 제거 완료. {original_shape[0]} -> {df_processed.shape[0]} 행\") elif method == 'impute': cols_to_impute = columns if columns else df_processed.select_dtypes(include=[np.number]).columns.tolist() for col in cols_to_impute: if col not in df_processed.columns: continue if df_processed[col].isnull().any(): if strategy == 'mean': fill_value = df_processed[col].mean() elif strategy == 'median': fill_value = df_processed[col].median() elif strategy == 'mode': fill_value = df_processed[col].mode()[0] if not df_processed[col].mode().empty else 0 else: fill_value = df_processed[col].mean() df_processed[col].fillna(fill_value, inplace=True) print(f\"컬럼 '{col}' 결측치를 'mean' 값({fill_value:.2f})으로 대체\") elif method == 'knn': numeric_cols = df_processed.select_dtypes(include=[np.number]).columns.tolist() if len(numeric_cols) > 0: imputer = KNNImputer(n_neighbors=n_neighbors) df_processed[numeric_cols] = imputer.fit_transform(df_processed[numeric_cols]) print(f\"KNN 방법으로 결측치 처리 완료 (n_neighbors=5)\") else: print(\"경고: 수치형 컬럼이 없어 KNN 방법을 사용할 수 없습니다.\") return df_processed p_column_selections = {'y': {'type': 'number', 'selected': True}, 'x1': {'type': 'number', 'selected': True}, 'x2': {'type': 'number', 'selected': True}, 'x3': {'type': 'number', 'selected': True}, 'x4': {'type': 'number', 'selected': True}, 'x5': {'type': 'number', 'selected': True}, 'x6': {'type': 'number', 'selected': True}, 'x7': {'type': 'number', 'selected': True}, 'x8': {'type': 'number', 'selected': True}, 'x9': {'type': 'number', 'selected': True}} p_columns = [c for c, s in p_column_selections.items() if isinstance(s, dict) and s.get('selected', False)] or None cleaned_data = handle_missing_values(dataframe, 'remove_row', 'mean', p_columns, 5) data_module_1 = cleaned_data print(f\"[결측치 처리] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [3/8] 데이터 스케일링 (ScalingTransform) ── dataframe = data_module_1 # ← [결측치 처리] 출력 from sklearn.preprocessing import MinMaxScaler, StandardScaler, RobustScaler import pandas as pd import numpy as np def normalize_data(df: pd.DataFrame, method: str = 'MinMax', columns: list = None): \"\"\" 데이터를 정규화합니다. \"\"\" print(f\"데이터 정규화 방법: 'MinMax'\") df_normalized = df.copy() if not columns: # None 또는 빈 리스트면 전체 수치형 컬럼을 대상으로 함 columns = df_normalized.select_dtypes(include=[np.number]).columns.tolist() if method == 'MinMax': scaler = MinMaxScaler() elif method == 'StandardScaler': scaler = StandardScaler() elif method == 'RobustScaler': scaler = RobustScaler() else: print(f\"알 수 없는 정규화 방법: 'MinMax'. MinMax를 사용합니다.\") scaler = MinMaxScaler() df_normalized[columns] = scaler.fit_transform(df_normalized[columns]) print(f\"정규화 완료. 컬럼: {columns}\") return df_normalized column_selections = {'y': {'type': 'number', 'selected': True}, 'x1': {'type': 'number', 'selected': True}, 'x2': {'type': 'number', 'selected': True}, 'x3': {'type': 'number', 'selected': True}, 'x4': {'type': 'number', 'selected': True}, 'x5': {'type': 'number', 'selected': True}, 'x6': {'type': 'number', 'selected': True}, 'x7': {'type': 'number', 'selected': True}, 'x8': {'type': 'number', 'selected': True}, 'x9': {'type': 'number', 'selected': True}} p_columns = [col for col, sel in column_selections.items() if sel.get('selected', False) and col in dataframe.columns] normalized_data = normalize_data(dataframe, 'MinMax', p_columns) data_module_1 = normalized_data print(f\"[데이터 스케일링] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [4/8] 데이터 분할 (SplitData) ── dataframe = data_module_1 # ← [데이터 스케일링] 출력 from sklearn.model_selection import train_test_split import pandas as pd df = dataframe.copy() df.index = range(len(df)) stratify_array = None if None and None != \"None\": stratify_array = df[None] split_kwargs = {} split_kwargs['train_size'] = 0.75 split_kwargs['random_state'] = 43 split_kwargs['shuffle'] = True if stratify_array is not None: split_kwargs['stratify'] = stratify_array train_data, test_data = train_test_split(df, **split_kwargs) data_module_1_train = train_data data_module_1_test = test_data print(f\"[데이터 분할] train: {data_module_1_train.shape}, test: {data_module_1_test.shape}\") print() # ── [5/8] Decision Tree 1 (DecisionTree) ── from sklearn.tree import DecisionTreeClassifier, DecisionTreeRegressor p_max_depth = None if None else None p_class_weight = None if None else None if 'classification' == 'classification': criterion_clf = 'gini'.lower() if 'gini' else 'gini' model = DecisionTreeClassifier( criterion=criterion_clf, max_depth=p_max_depth, min_samples_split=2, min_samples_leaf=1, class_weight=p_class_weight, random_state=42 ) else: criterion_reg = 'squared_error' if 'gini' == 'mse' else 'absolute_error' model = DecisionTreeRegressor( criterion=criterion_reg, max_depth=p_max_depth, min_samples_split=2, min_samples_leaf=1, random_state=42 ) print(f\"Decision Tree model instance created successfully ({'classification'}).\") print(f\" Criterion: {'gini'}\") print(f\" Max Depth: {p_max_depth}\") print(f\" Min Samples Split: {2}\") print(f\" Min Samples Leaf: {1}\") if 'classification' == 'classification': print(f\" Class Weight: {p_class_weight}\") model_module_1 = model print(f\"[Decision Tree 1] 모델: {model_module_1}\") print() # ── [6/8] 모델 학습 (TrainModel) ── dataframe = data_module_1_train # ← [데이터 분할] 출력 trained_model = model_module_1 # ← [Decision Tree 1] 출력 import pandas as pd p_feature_columns = ['x1', 'x2', 'x3', 'x4', 'x5', 'x6', 'x7', 'x8', 'x9'] X_train = dataframe[p_feature_columns] y_train = dataframe['y'] trained_model = model.fit(X_train, y_train) model_module_1 = trained_model print(f\"[모델 학습] 모델: {model_module_1}\") print() # ── [7/8] 모델 예측 (ScoreModel) ── dataframe = data_module_1_test # ← [데이터 분할] 출력 trained_model = model_module_1 # ← [모델 학습] 출력 import pandas as pd if hasattr(trained_model, 'feature_names_in_'): feature_columns = list(trained_model.feature_names_in_) else: feature_columns = dataframe.select_dtypes(include=['number']).columns.tolist() X_second = dataframe[feature_columns] predictions = trained_model.predict(X_second) scored_data = dataframe.copy() scored_data['Predict'] = predictions data_module_1 = scored_data print(f\"[모델 예측] shape: {data_module_1.shape}\") print(data_module_1.head(5).to_string()) print() # ── [8/8] 모델 평가 (EvaluateModel) ── dataframe = data_module_1 # ← [모델 예측] 출력 from sklearn.metrics import ( accuracy_score, precision_score, recall_score, f1_score, mean_squared_error, mean_absolute_error, r2_score, roc_auc_score, average_precision_score, ) import pandas as pd import numpy as np y_true = scored_data['y'] y_pred = scored_data['y_Predict_Proba_1'] if 'classification' == 'classification': accuracy = accuracy_score(y_true, y_pred) precision = precision_score(y_true, y_pred, average='weighted', zero_division=0) recall = recall_score(y_true, y_pred, average='weighted', zero_division=0) f1 = f1_score(y_true, y_pred, average='weighted', zero_division=0) evaluation_metrics = { 'accuracy': accuracy, 'precision': precision, 'recall': recall, 'f1_score': f1 } print(\"Classification Evaluation Metrics:\") print(f\" Accuracy: {accuracy:.6f}\") print(f\" Precision: {precision:.6f}\") print(f\" Recall: {recall:.6f}\") print(f\" F1-Score: {f1:.6f}\") roc_auc = None avg_precision = None try: classes_sorted = sorted(pd.unique(y_true).tolist()) feat_cols = list(getattr(trained_model, 'feature_names_in_', [])) if not feat_cols: feat_cols = scored_data.select_dtypes(include=['number']).columns.tolist() X_eval = scored_data[feat_cols] if hasattr(trained_model, 'predict_proba'): y_score = np.asarray(trained_model.predict_proba(X_eval)) elif hasattr(trained_model, 'decision_function'): y_score = np.asarray(trained_model.decision_function(X_eval)) else: y_score = None if y_score is not None: if len(classes_sorted) == 2: if y_score.ndim == 2 and y_score.shape[1] >= 2: pos_score = y_score[:, 1] else: pos_score = y_score.ravel() pos_label = classes_sorted[1] y_bin = (np.asarray(y_true) == pos_label).astype(int) roc_auc = float(roc_auc_score(y_bin, pos_score)) avg_precision = float(average_precision_score(y_bin, pos_score)) else: roc_auc = float(roc_auc_score( y_true, y_score, multi_class='ovr', average='macro' )) except Exception: roc_auc = None avg_precision = None if roc_auc is not None: evaluation_metrics['roc_auc'] = roc_auc print(f\" ROC-AUC: {roc_auc:.6f}\") else: print(\" ROC-AUC: N/A (model has no probability/score output)\") if avg_precision is not None: evaluation_metrics['average_precision'] = avg_precision print(f\" Average Precision (PR-AUC): {avg_precision:.6f}\") else: print(\" Average Precision (PR-AUC): N/A (binary probability scores required)\") else: # regression mse = mean_squared_error(y_true, y_pred) rmse = np.sqrt(mse) mae = mean_absolute_error(y_true, y_pred) r2 = r2_score(y_true, y_pred) y_true_arr = np.asarray(y_true, dtype=float) y_pred_arr = np.asarray(y_pred, dtype=float) y_mean = float(np.mean(y_true_arr)) ss_res = float(np.sum((y_true_arr - y_pred_arr) ** 2)) ss_tot = float(np.sum((y_true_arr - y_mean) ** 2)) abs_res = float(np.sum(np.abs(y_true_arr - y_pred_arr))) abs_tot = float(np.sum(np.abs(y_true_arr - y_mean))) rse = (ss_res / ss_tot) if ss_tot > 0 else float('nan') # Relative Squared Error rae = (abs_res / abs_tot) if abs_tot > 0 else float('nan') # Relative Absolute Error evaluation_metrics = { 'mse': mse, 'rmse': rmse, 'mae': mae, 'r2': r2, 'relative_squared_error': rse, 'relative_absolute_error': rae } print(\"Regression Evaluation Metrics:\") print(f\" Mean Squared Error (MSE): {mse:.6f}\") print(f\" Root Mean Squared Error (RMSE): {rmse:.6f}\") print(f\" Mean Absolute Error (MAE): {mae:.6f}\") print(f\" R-squared (R²): {r2:.6f}\") print(f\" Relative Squared Error (RSE): {rse:.6f}\") print(f\" Relative Absolute Error (RAE): {rae:.6f}\") eval_module_1 = evaluation_metrics print(f\"[모델 평가] 완료\") print(eval_module_1) print() # ── 파이프라인 실행 완료 ──"
